<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="ja" xml:lang="ja">

<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
    <meta name="description" content="{{description}}">
    <meta name="keywords" content="{{keywords}}">
    <meta name="format-detection" content="telephone=no">
    <title>{{title}}</title>

    <!-- ogタグ -->
    <meta property="og:title" content="{{title}}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="">
    <meta property="og:image" content="">
    <meta property="og:description" content="{{description}}">
    <meta property="og:site_name" content="">
    <meta property="og:locale" content="ja_JP">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{title}}">
    <meta name="twitter:description" content="{{description}}">
    <meta name="twitter:image" content="">

    <meta name="robots" content="noindex">

    <!-- favicon -->
    <!-- <link rel="apple-touch-icon" sizes="180x180" href=""> -->
    <link rel="icon" href="">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    {{#unless isDev}}
        <!-- js -->
        <!-- jquery -->
        <script src="/assets/js/jquery-3.6.3.min.js" defer></script>
        <!-- scroll-hint -->
        <script src="https://unpkg.com/scroll-hint@latest/js/scroll-hint.min.js" defer></script>
        <!-- swiper -->
        <script src="/assets/js/swiper-bundle.min.js" defer></script>
        <!-- gsap -->
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/ScrollTrigger.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/SplitText.min.js"></script>
        <!-- script -->
        <script src="/assets/js/script.js" defer></script>
    {{/unless}}

    <!-- css -->
    <!-- scroll-hint -->
    <link rel="stylesheet" href="https://unpkg.com/scroll-hint@latest/css/scroll-hint.css" />
    <!-- swiper -->
    <link rel="stylesheet" href="/assets/css/swiper-bundle.min.css" />
    <!-- style -->
    <link rel="stylesheet" type="text/css" href="/assets/css/style.css" media="all">


    <!-- CSS（dev / build で JS から差し込む） -->
    {{#if isDev}}
        <!-- dev用：Vite（HMR） -->
        <script defer type="module" src="/assets/js/index.js"></script>
    {{/if}}
</head>

<body>

    <header class="p-header">
        <div class="p-header__inner">
            <a href="/" class="p-header__logo">
                <img src="/assets/img/logo01.svg" alt="赤と緑の台形を組み合わせたロゴとmenuのテキスト" loading="lazy" decoding="async" width="72" height="20">
            </a>
            <button type="button" class="p-hamburger" aria-label="メニューを開く">
                <span class="p-hamburger__line"></span>
                <span class="p-hamburger__line"></span>
                <span class="p-hamburger__line"></span>
            </button>
        </div>
    </header>


    <!-- drawer overlay -->
    <div class="p-drawer-overlay"></div>

    <!-- drawer -->
    <nav class="p-globalmenusp">
        <div class="p-globalmenusp__container">
            <button class="p-globalmenusp__close">
                <img src="/assets/img/icon_close.svg" alt="閉じる" loading="lazy" decoding="async" width="30" height="30">
            </button>
            <a href="/" class="p-globalmenusp__logo">
                <img src="/assets/img/logo01.svg" alt="menuのロゴ" loading="lazy" decoding="async" width="72" height="20">
            </a>

            <div class="p-globalmenusp__inner">
                <!-- メインナビ -->
                <ul class="p-globalmenusp__list">
                    <li class="p-globalmenusp__item">
                        <a href="/" class="p-globalmenusp__trigger">
                            <span class="p-globalmenusp__trigger_text">TOP</span>
                            <span class="p-globalmenusp__trigger_arrow"><img src="/assets/img/icon_arrow_green01.svg" alt="" loading="lazy" decoding="async" width="14" height="12"></span>
                        </a>
                    </li>
                    <li class="p-globalmenusp__item">
                        <a href="/coupon.html" class="p-globalmenusp__trigger">
                            <span class="p-globalmenusp__trigger_text">クーポン&amp;キャンペーン情報</span>
                            <span class="p-globalmenusp__trigger_arrow"><img src="/assets/img/icon_arrow_green01.svg" alt="" loading="lazy" decoding="async" width="14" height="12"></span>
                        </a>
                    </li>
                    <li class="p-globalmenusp__item">
                        <a href="/delivery-area.html" class="p-globalmenusp__trigger">
                            <span class="p-globalmenusp__trigger_text">デリバリーエリア</span>
                            <span class="p-globalmenusp__trigger_arrow"><img src="/assets/img/icon_arrow_green01.svg" alt="" loading="lazy" decoding="async" width="14" height="12"></span>
                        </a>
                    </li>
                    <li class="p-globalmenusp__item">
                        <a href="/payment.html" class="p-globalmenusp__trigger">
                            <span class="p-globalmenusp__trigger_text">支払い方法</span>
                            <span class="p-globalmenusp__trigger_arrow"><img src="/assets/img/icon_arrow_green01.svg" alt="" loading="lazy" decoding="async" width="14" height="12"></span>
                        </a>
                    </li>
                    <li class="p-globalmenusp__item">
                        <a href="/grocery.html" class="p-globalmenusp__trigger">
                            <span class="p-globalmenusp__trigger_text">日用品・食料品(グロサリー)</span>
                            <span class="p-globalmenusp__trigger_arrow"><img src="/assets/img/icon_arrow_green01.svg" alt="" loading="lazy" decoding="async" width="14" height="12"></span>
                        </a>
                    </li>
                </ul>

                <!-- CTAボタン -->
                <div class="p-globalmenusp__btn-wrap">
                    <a href="" class="p-globalmenusp__cta-btn" target="_blank" rel="noopener noreferrer">
                        <span class="p-globalmenusp__cta-text">配達クルーにご興味のある方はこちら</span>
                        <span class="p-globalmenusp__cta-icon">
                            <img src="/assets/img/icon_link_green01.svg" alt="" loading="lazy" decoding="async" width="16" height="16">
                        </span>
                    </a>
                    <a href="" class="p-globalmenusp__cta-btn" target="_blank" rel="noopener noreferrer">
                        <span class="p-globalmenusp__cta-text">menuへ出店をご検討の方はこちら</span>
                        <span class="p-globalmenusp__cta-icon">
                            <img src="/assets/img/icon_link_green01.svg" alt="" loading="lazy" decoding="async" width="16" height="16">
                        </span>
                    </a>
                </div>

                <!-- フッターリンク -->
                <div class="p-globalmenusp__footer">
                    <div class="p-globalmenusp__footer-inner">
                        <!-- サブナビ（2カラム） -->
                        <ul class="p-globalmenusp__subnav">
                            <li class="p-globalmenusp__subnav-item">
                                <a href="" class="p-globalmenusp__subnav-link" target="_blank" rel="noopener noreferrer">
                                    <span class="p-globalmenusp__subnav-text">menu株式会社</span>
                                    <span class="p-globalmenusp__subnav-icon">
                                        <img src="/assets/img/icon_link_green01.svg" alt="" loading="lazy" decoding="async" width="16" height="16">
                                    </span>
                                </a>
                            </li>
                            <li class="p-globalmenusp__subnav-item">
                                <a href="" class="p-globalmenusp__subnav-link" target="_blank" rel="noopener noreferrer">
                                    <span class="p-globalmenusp__subnav-text">採用情報はこちら</span>
                                    <span class="p-globalmenusp__subnav-icon">
                                        <img src="/assets/img/icon_link_green01.svg" alt="" loading="lazy" decoding="async" width="16" height="16">
                                    </span>
                                </a>
                            </li>
                            <li class="p-globalmenusp__subnav-item">
                                <a href="" class="p-globalmenusp__subnav-link" target="_blank" rel="noopener noreferrer">
                                    <span class="p-globalmenusp__subnav-text">新着情報</span>
                                    <span class="p-globalmenusp__subnav-icon">
                                        <img src="/assets/img/icon_link_green01.svg" alt="" loading="lazy" decoding="async" width="16" height="16">
                                    </span>
                                </a>
                            </li>
                        </ul>

                        <!-- お問い合わせリンク -->
                        <div class="p-globalmenusp__contact">
                            <a href="" class="p-globalmenusp__contact-link">配達員に関するお問い合わせ</a>
                            <a href="" class="p-globalmenusp__contact-link">menuご利用に関するお問い合せ</a>
                        </div>
                    </div>

                    <!-- SNS -->
                    <div class="p-globalmenusp__social">
                        <span class="p-globalmenusp__social-label">Follow us</span>
                        <div class="p-globalmenusp__social-icons">
                            <a href="" class="p-globalmenusp__social-link" target="_blank" rel="noopener noreferrer" aria-label="X(Twitter)">
                                <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M15.27 2H18.04L11.9 9.01L19.12 18H13.44L9.02 12.19L3.97 18H1.19L7.75 10.51L0.83 2H6.64L10.65 7.31L15.27 2ZM14.29 16.36H15.82L5.73 3.58H4.08L14.29 16.36Z" fill="#323232" />
                                </svg>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>
